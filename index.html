<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Manning Dashboard — Kyneton</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding:24px 20px}
.hdr{padding-bottom:16px;border-bottom:1px solid #1e293b;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px}
.hdr h2{font-size:20px;font-weight:600;color:#f1f5f9}
.hdr p{font-size:12px;color:#64748b;margin-top:3px}
.etoggle{font-size:12px;color:#38bdf8;cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
.sum-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:20px}
.met{border-radius:10px;padding:12px 14px}
.met-val{font-size:22px;font-weight:600}
.met-lbl{font-size:11px;margin-top:3px;opacity:.85}
.met-neutral{background:#1e293b}.met-neutral .met-val{color:#f1f5f9}.met-neutral .met-lbl{color:#94a3b8}
.met-green{background:#052e16}.met-green .met-val,.met-green .met-lbl{color:#4ade80}
.met-orange{background:#431407}.met-orange .met-val,.met-orange .met-lbl{color:#fb923c}
.met-red{background:#450a0a}.met-red .met-val,.met-red .met-lbl{color:#f87171}
.met-grey{background:#1e293b}.met-grey .met-val{color:#94a3b8}.met-grey .met-lbl{color:#64748b}
.alert{border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:13px;display:none;background:#450a0a;border:1px solid #7f1d1d;color:#f87171}
.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#475569}
.card.sel{border:2px solid #38bdf8}
.card.crit{border-color:#ef4444}
.card.warn{border-color:#f97316}
.card.over{border-color:#22c55e}
.cname{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:6px}
.cnum{font-size:26px;font-weight:700;margin-bottom:8px}
.bar-t{background:#0f172a;border-radius:4px;height:7px;overflow:hidden;margin-bottom:10px}
.bar-f{height:100%;border-radius:4px;transition:width .4s}
.cmeta{font-size:11px;color:#64748b;display:flex;flex-wrap:wrap;gap:6px}
.col-green{color:#4ade80}.col-orange{color:#fb923c}.col-red{color:#f87171}.col-blue{color:#38bdf8}
.detail{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px;display:none;margin-bottom:20px}
.det-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.det-ttl{font-size:16px;font-weight:600;color:#f1f5f9}
.closebtn{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:12px;color:#94a3b8;font-family:inherit}
.det-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:18px}
.slbl{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #334155}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;background:#0f172a;margin-bottom:5px}
.sname{font-size:13px;color:#cbd5e1}
.sgap{font-size:11px;padding:2px 8px;border-radius:20px;background:#450a0a;color:#f87171}
.sok{font-size:11px;color:#4ade80}
.sover-tag{font-size:11px;color:#4ade80}
.cmt{background:#0f172a;border-radius:8px;padding:12px;margin-top:12px;font-size:12px;color:#94a3b8}
.cmtlbl{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.gapbox{background:#431407;border:1px solid #7c2d12;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#fb923c}
.editor{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:20px;display:none}
.etabs{display:flex;gap:6px;margin-bottom:16px}
.etab{padding:5px 14px;font-size:12px;border:1px solid #334155;border-radius:8px;cursor:pointer;color:#64748b;background:#0f172a;font-family:inherit}
.etab.on{border-color:#38bdf8;color:#38bdf8;font-weight:600}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.ef{display:flex;flex-direction:column;gap:4px}
.elbl{font-size:12px;color:#94a3b8;font-weight:500}
.esub{font-size:11px;color:#64748b}
.erow{display:flex;gap:8px;align-items:center}
.erow input{width:58px;padding:5px 8px;font-size:13px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#f1f5f9;text-align:center;font-family:inherit}
.erow input:focus{outline:none;border-color:#38bdf8}
.erow span{font-size:12px;color:#64748b}
.ubtn{margin-top:14px;padding:7px 18px;font-size:13px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#f1f5f9;cursor:pointer;font-family:inherit}
.ubtn:hover{background:#334155}
.cnote{font-size:11px;color:#fb923c;margin-top:8px;display:none}
.tgt-note{font-size:12px;color:#64748b;margin-bottom:14px}
@media(max-width:600px){.sum-grid{grid-template-columns:repeat(2,1fr)}.sum-grid .met:last-child{grid-column:span 2}}
</style>
</head>
<body>

<div class="hdr">
  <div><h2>Room manning dashboard</h2><p>Kilcoy Global Foods · Kyneton · w/c <span id="wklbl">03.03.2026</span></p></div>
  <button class="etoggle" onclick="toggleEd()">edit ↓</button>
</div>

<div class="editor" id="ed">
  <div class="etabs">
    <button class="etab on" id="t-hc" onclick="swTab('hc')">Current headcount</button>
    <button class="etab" id="t-tgt" onclick="swTab('tgt')">Approved targets</button>
  </div>
  <div id="p-hc"><div class="egrid" id="g-hc"></div><button class="ubtn" onclick="applyHC()">Update headcount</button></div>
  <div id="p-tgt" style="display:none">
    <p class="tgt-note">Update when approved headcount changes. This sets the manning target for each shift.</p>
    <div class="egrid" id="g-tgt"></div>
    <div class="cnote" id="cnote">Unsaved target changes — press update to apply</div>
    <button class="ubtn" onclick="applyTgt()">Update approved targets</button>
  </div>
</div>

<div class="sum-grid" id="sg"></div>
<div class="alert" id="ab"></div>
<div class="rooms" id="rg"></div>

<div class="detail" id="dp">
  <div class="det-hdr">
    <div class="det-ttl" id="dttl"></div>
    <button class="closebtn" onclick="closeD()">close</button>
  </div>
  <div class="det-stats" id="dstats"></div>
  <div id="dbody"></div>
</div>

<script>
const PL={A:"Above moderate",M:"Moderate",L:"Light"};
const ROOMS=[
  {id:"boning",name:"Boning room",shifts:[{label:"Shannon Ebert",current:71,target:79,comment:"1 will leave for training",pes:"M"}]},
  {id:"beefkill",name:"Beef kill floor",shifts:[{label:"AM (Brodie Dawson)",current:39,target:40,comment:null,pes:"A"},{label:"PM (William Dorling)",current:36,target:36,comment:"1x WC",pes:"A"}]},
  {id:"lambkill",name:"Lamb kill floor",shifts:[{label:"Jason Coley",current:94,target:99,comment:"2 x WC",pes:"A"}]},
  {id:"loadout",name:"Loadout",shifts:[{label:"AM (Julian Williams)",current:33,target:30,comment:"2x one day a week",pes:"L"},{label:"PM (Jordan Lopez)",current:19,target:20,comment:"1x one day a week",pes:"L"}]},
  {id:"offal-am",name:"Offal AM",shifts:[{label:"Paul Botheras",current:40,target:44,comment:null,pes:"M"}]},
  {id:"offal-pm",name:"Offal PM",shifts:[{label:"Jacinta Webber",current:14,target:13,comment:null,pes:"M"}]}
];

const rC=r=>r.shifts.reduce((s,x)=>s+x.current,0);
const rT=r=>r.shifts.reduce((s,x)=>s+x.target,0);
const pc=(c,t)=>t===0?0:Math.min(Math.round(c/t*100),100);
const st=(c,t)=>c>t?"over":c===t?"full":pc(c,t)>=85?"good":pc(c,t)>=70?"warn":"crit";
const BC={over:"#4ade80",full:"#4ade80",good:"#4ade80",warn:"#fb923c",crit:"#f87171"};

function pctCls(p){return p>=100?"met-green":p>=90?"met-orange":"met-red"}
function gapCls(g){return g===0?"met-green":g<=9?"met-orange":"met-red"}
function overCls(o){return o>0?"met-green":"met-grey"}
function onTgtCls(n,tot){return n===tot?"met-green":"met-neutral"}

function tile(val,lbl,cls){return`<div class="met ${cls}"><div class="met-val">${val}</div><div class="met-lbl">${lbl}</div></div>`}

let sel=null,activeTab="hc";

function swTab(t){
  activeTab=t;
  document.getElementById("p-hc").style.display=t==="hc"?"block":"none";
  document.getElementById("p-tgt").style.display=t==="tgt"?"block":"none";
  document.getElementById("t-hc").className="etab"+(t==="hc"?" on":"");
  document.getElementById("t-tgt").className="etab"+(t==="tgt"?" on":"");
  t==="hc"?buildHC():buildTgt();
}
function toggleEd(){
  const e=document.getElementById("ed"),btn=document.querySelector(".etoggle"),open=e.style.display==="block";
  e.style.display=open?"none":"block";btn.textContent=open?"edit ↓":"hide ↑";
  if(!open) activeTab==="hc"?buildHC():buildTgt();
}
function buildHC(){
  document.getElementById("g-hc").innerHTML=ROOMS.flatMap(r=>r.shifts.map(s=>{
    const k=`hc-${r.id}-${s.label.replace(/\W/g,'_')}`;
    return`<div class="ef"><div class="elbl">${r.name}</div><div class="esub">${r.shifts.length>1?s.label:"Current headcount"}</div><div class="erow"><input type="number" id="${k}" value="${s.current}" min="0" max="999" step="1"><span>/ ${s.target} target</span></div></div>`;
  })).join("");
}
function buildTgt(){
  document.getElementById("g-tgt").innerHTML=ROOMS.flatMap(r=>r.shifts.map(s=>{
    const k=`tgt-${r.id}-${s.label.replace(/\W/g,'_')}`;
    return`<div class="ef"><div class="elbl">${r.name}</div><div class="esub">${r.shifts.length>1?s.label:"Approved target"}</div><div class="erow"><input type="number" id="${k}" value="${s.target}" min="0" max="999" step="1" oninput="document.getElementById('cnote').style.display='block'"><span>approved HC</span></div></div>`;
  })).join("");
  document.getElementById("cnote").style.display="none";
}
function applyHC(){
  ROOMS.forEach(r=>r.shifts.forEach(s=>{const i=document.getElementById(`hc-${r.id}-${s.label.replace(/\W/g,'_')}`);if(i)s.current=parseInt(i.value)||0;}));
  render();if(sel){const r=ROOMS.find(r=>r.id===sel);if(r)showD(r);}buildHC();
}
function applyTgt(){
  ROOMS.forEach(r=>r.shifts.forEach(s=>{const i=document.getElementById(`tgt-${r.id}-${s.label.replace(/\W/g,'_')}`);if(i)s.target=parseInt(i.value)||0;}));
  render();if(sel){const r=ROOMS.find(r=>r.id===sel);if(r)showD(r);}buildHC();buildTgt();
  document.getElementById("cnote").style.display="none";
}

function render(){
  const totC=ROOMS.reduce((s,r)=>s+rC(r),0);
  const totT=ROOMS.reduce((s,r)=>s+rT(r),0);
  const totGap=ROOMS.reduce((s,r)=>{const g=rT(r)-rC(r);return s+(g>0?g:0)},0);
  const totOver=ROOMS.reduce((s,r)=>{const g=rC(r)-rT(r);return s+(g>0?g:0)},0);
  const onTgt=ROOMS.filter(r=>{const s=st(rC(r),rT(r));return s==="full"||s==="over";}).length;
  const op=pc(totC,totT);
  document.getElementById("sg").innerHTML=
    tile(totC+" / "+totT,"On floor","met-neutral")+
    tile(op+"%","Staffed",pctCls(op))+
    tile(totGap>0?"-"+totGap:"✓","Total gap",gapCls(totGap))+
    tile(totOver>0?"+"+totOver:"—","Over target",overCls(totOver))+
    tile(onTgt+" / "+ROOMS.length,"Rooms on target",onTgtCls(onTgt,ROOMS.length));
  const crits=ROOMS.filter(r=>st(rC(r),rT(r))==="crit");
  const warns=ROOMS.filter(r=>st(rC(r),rT(r))==="warn");
  const a=document.getElementById("ab");
  if(crits.length||warns.length){
    a.style.display="block";
    a.textContent=(crits.length?crits.map(r=>r.name).join(", ")+" critically understaffed. ":"")+(warns.length?warns.map(r=>r.name).join(", ")+" below target.":"");
  } else a.style.display="none";
  const grid=document.getElementById("rg");grid.innerHTML="";
  ROOMS.forEach(r=>{
    const c=rC(r),t=rT(r),s=st(c,t),p=pc(c,t),gap=t-c;
    const card=document.createElement("div");
    card.className="card"+(s==="crit"?" crit":s==="warn"?" warn":(s==="over"||s==="full")?" over":"")+(sel===r.id?" sel":"");
    card.id="card-"+r.id;
    card.innerHTML=`<div class="cname">${r.name}${r.shifts.length>1?' <span style="font-size:10px;color:#64748b;font-weight:400">AM+PM</span>':''}</div>
      <div class="cnum" style="color:${BC[s]}">${c} <span style="font-size:15px;color:#64748b">/ ${t}</span></div>
      <div class="bar-t"><div class="bar-f" style="width:${p}%;background:${BC[s]}"></div></div>
      <div class="cmeta"><span>${p}%</span>${gap>0?`<span class="col-red">▾ ${gap} gap</span>`:""}${gap<0?`<span class="col-green">▴ ${Math.abs(gap)} over</span>`:""}${gap===0?`<span class="col-green">✓ on target</span>`:""}</div>`;
    card.onclick=()=>{if(sel===r.id){closeD();return;}sel=r.id;showD(r);};
    grid.appendChild(card);
  });
}

function showD(room){
  const c=rC(room),t=rT(room),s=st(c,t),gap=t-c;
  document.getElementById("dttl").textContent=room.name;
  document.getElementById("dstats").innerHTML=`
    <div class="met met-neutral"><div class="met-val" style="color:${BC[s]}">${c}</div><div class="met-lbl">On floor</div></div>
    <div class="met met-neutral"><div class="met-val">${t}</div><div class="met-lbl">Approved target</div></div>
    <div class="met ${gapCls(Math.max(gap,0))}"><div class="met-val">${gap>0?"-"+gap:gap<0?"+"+Math.abs(gap):"✓"}</div><div class="met-lbl">Gap</div></div>`;
  let body="";
  if(room.shifts.length>1){
    body+=`<div style="margin-bottom:14px"><div class="slbl">Shift breakdown</div>`;
    room.shifts.forEach(sh=>{
      const sg=sh.target-sh.current,ss=st(sh.current,sh.target);
      body+=`<div class="srow"><div><div class="sname">${sh.label}</div><div style="font-size:11px;color:#64748b">Min. PES: ${PL[sh.pes]}</div></div>
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:600;color:${BC[ss]}">${sh.current} / ${sh.target}</span>
        ${sg>0?`<span class="sgap">-${sg}</span>`:sg<0?`<span class="sover-tag">+${Math.abs(sg)}</span>`:`<span class="sok">✓</span>`}</div></div>`;
    });
    body+=`</div>`;
  } else {
    body+=`<div style="margin-bottom:14px"><div class="slbl">Detail</div>
      <div class="srow"><div class="sname">Minimum PES required</div><div style="font-size:13px;font-weight:600;color:#f1f5f9">${PL[room.shifts[0].pes]}</div></div></div>`;
  }
  const cmts=room.shifts.filter(s=>s.comment);
  if(cmts.length){
    body+=`<div class="cmt"><div class="cmtlbl">Notes</div>`;
    cmts.forEach(s=>{body+=`<div style="margin-top:5px">${room.shifts.length>1?`<span style="font-weight:600;color:#cbd5e1">${s.label}:</span> `:""}${s.comment}</div>`;});
    body+=`</div>`;
  }
  if(gap>0) body+=`<div class="gapbox">${gap} ${gap===1?"person":"people"} needed to reach approved target${room.shifts.length>1?" — see shift breakdown above":""}</div>`;
  document.getElementById("dbody").innerHTML=body;
  document.getElementById("dp").style.display="block";
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("sel"));
  const ac=document.getElementById("card-"+room.id);if(ac)ac.classList.add("sel");
  setTimeout(()=>document.getElementById("dp").scrollIntoView({behavior:"smooth",block:"nearest"}),80);
}
function closeD(){
  sel=null;document.getElementById("dp").style.display="none";
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("sel"));
}
render();
</script>
</body>
</html>
